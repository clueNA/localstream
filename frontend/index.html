<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalStream</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">LocalStream</div>
      <input id="search" type="search" placeholder="Search your library" />
      <button id="theme-toggle" class="ghost">Toggle Theme</button>
    </header>

    <main>
      <section class="section" id="continue-section">
        <h2>Continue Watching</h2>
        <div class="media-grid" id="continue-grid"></div>
      </section>

      <section class="section">
        <h2>Recently Added</h2>
        <div class="media-grid" id="recent-grid"></div>
      </section>

      <section class="section">
        <h2>All Titles</h2>
        <div class="media-grid" id="all-grid"></div>
      </section>
    </main>

    <div id="password-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Enter Streaming Password</h3>
        <input id="password-input" type="password" placeholder="Password" />
        <button id="password-submit">Unlock</button>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
